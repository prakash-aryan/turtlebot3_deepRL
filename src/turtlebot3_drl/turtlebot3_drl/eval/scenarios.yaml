# Deterministic test scenarios for stage 9.
#
# Each scenario fixes (robot_start, goal). Obstacle phase is also fixed:
# the eval runner resets the gz-sim clock to 0 at the start of every
# scenario, so the six animated cylinders always replay the same
# trajectories from their SDF spawn poses ((2,2), (-2,-2), (2,-2),
# (-2,2), (0,-2), (0,2)). Walls in the world file are already static.
#
# Coordinates are in meters; yaw in radians (0 = +x, pi/2 = +y).
# Goal is reached when |robot - goal| < 0.20 m (THREHSOLD_GOAL).
# Episode times out at EPISODE_TIMEOUT_SECONDS = 50 sim seconds.
#
# Hand-picked to span:
#   easy (5)  - short distance, clear LOS at t=0
#   medium (8) - medium distance, at least one obstacle/wall in the way
#   hard  (5) - long distance, multi-obstacle, narrow corridor, or
#               obstacle phase requiring reactive avoidance
#   edge  (2) - extreme yaw or very short goal

scenarios:
  - id: S01
    tag: easy_right_short
    difficulty: easy
    start: {x:  0.0, y:  0.0, yaw:  0.0}
    goal:  {x:  1.0, y:  0.3}

  - id: S02
    tag: easy_forward_down
